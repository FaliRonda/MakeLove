<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -14 136 128" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="vmGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="25%" stop-color="#e8c547"/>
      <stop offset="55%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#5c4016"/>
    </linearGradient>
    <linearGradient id="vmGoldEdge" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="50%" stop-color="#f0d78c"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="vmPlume" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4a8ff"/>
      <stop offset="40%" stop-color="#6b2d8a"/>
      <stop offset="100%" stop-color="#2d1544"/>
    </linearGradient>
    <linearGradient id="vmShine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a0a1f" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="vmGem" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a8f0ff"/>
      <stop offset="50%" stop-color="#1e6b9e"/>
      <stop offset="100%" stop-color="#0d2840"/>
    </radialGradient>
    <mask id="vmFaceCutouts" maskUnits="userSpaceOnUse">
      <rect x="-18" y="-14" width="136" height="128" fill="white"/>
      <ellipse cx="36" cy="46" rx="11" ry="13" fill="black"/>
      <ellipse cx="64" cy="46" rx="11" ry="13" fill="black"/>
      <ellipse cx="50" cy="70" rx="9" ry="7" fill="black"/>
    </mask>
    <filter id="vmGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="vmDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="s"/>
      <feOffset dx="0" dy="1" result="o"/>
      <feComponentTransfer in="o" result="a">
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="a"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g mask="url(#vmFaceCutouts)" filter="url(#vmDrop)">
    <!-- Plumas / penacho superior (sobresale del círculo facial) -->
    <path
      d="M50 -10 C44 -4 38 4 34 12 C32 8 30 2 28 -4 C26 2 27 10 30 16 C26 12 22 6 18 2 C22 10 28 18 33 22 C40 14 45 2 50 -10Z"
      fill="url(#vmPlume)"
      opacity="0.92"
    />
    <path
      d="M50 -10 C56 -4 62 4 66 12 C68 8 70 2 72 -4 C74 2 73 10 70 16 C74 12 78 6 82 2 C78 10 72 18 67 22 C60 14 55 2 50 -10Z"
      fill="url(#vmPlume)"
      opacity="0.88"
    />
    <path d="M50 -12 L46 6 L50 10 L54 6 Z" fill="url(#vmGold)" opacity="0.9"/>

    <!-- Rizos laterales tipo filigrana -->
    <path
      d="M12 44 C4 40 0 50 4 58 C8 54 10 50 12 44ZM8 56 C4 64 8 72 16 74 M14 62 C10 70 14 78 22 80"
      stroke="url(#vmGoldEdge)"
      stroke-width="1.35"
      stroke-linecap="round"
    />
    <path
      d="M88 44 C96 40 100 50 96 58 C92 54 90 50 88 44ZM92 56 C96 64 92 72 84 74 M86 62 C90 70 86 78 78 80"
      stroke="url(#vmGoldEdge)"
      stroke-width="1.35"
      stroke-linecap="round"
    />

    <!-- Silueta colombina / frente -->
    <path
      d="M50 8 C30 10 14 26 12 42 C10 52 16 58 24 58 C28 42 36 28 50 24 C64 28 72 42 76 58 C84 58 90 52 88 42 C86 26 70 10 50 8Z"
      fill="url(#vmGold)"
      fill-opacity="0.14"
      stroke="url(#vmGold)"
      stroke-width="1.1"
      filter="url(#vmGlow)"
    />

    <!-- Banda harlequin sugerida -->
    <path d="M22 38 L32 42 L22 46 Z M78 38 L68 42 L78 46 Z" fill="#6b1c32" fill-opacity="0.55"/>
    <path d="M28 52 L38 56 L28 60 Z M72 52 L62 56 L72 60 Z" fill="#1a4d6e" fill-opacity="0.5"/>

    <!-- Contorno principal del rostro enmascarado -->
    <path
      d="M50 16 C34 18 20 32 16 48 C14 58 20 68 30 72 C34 84 42 92 50 94 C58 92 66 84 70 72 C80 68 86 58 84 48 C80 32 66 18 50 16Z"
      stroke="url(#vmGold)"
      stroke-width="2.55"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Bisel interior brillante -->
    <path
      d="M50 20 C36 22 24 34 20 48 C19 56 24 64 32 68 C36 78 42 86 50 88 C58 86 64 78 68 68 C76 64 81 56 80 48 C76 34 64 22 50 20Z"
      stroke="#f5e6c8"
      stroke-width="0.65"
      stroke-opacity="0.5"
      fill="none"
    />

    <!-- Puente y detalle bajo nariz -->
    <path d="M50 54 L50 68" stroke="#4a3020" stroke-width="1.15" stroke-linecap="round"/>
    <path
      d="M42 78 C46 86 54 86 58 78"
      stroke="url(#vmGold)"
      stroke-width="1.2"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Gemas en coronilla -->
    <circle cx="38" cy="22" r="2.2" fill="url(#vmGem)" stroke="#f5e6c8" stroke-width="0.4"/>
    <circle cx="62" cy="22" r="2.2" fill="url(#vmGem)" stroke="#f5e6c8" stroke-width="0.4"/>
    <circle cx="50" cy="14" r="2.6" fill="url(#vmGem)" stroke="url(#vmGold)" stroke-width="0.45"/>

    <!-- Brillo global -->
    <ellipse cx="50" cy="44" rx="34" ry="38" fill="url(#vmShine)" opacity="0.42"/>
  </g>
</svg>
